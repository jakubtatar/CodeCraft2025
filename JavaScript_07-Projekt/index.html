<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="counter">You have 0 tasks!</h1>
    <div>
        <input id="taskInput" placeholder="Add task">
        <button id="addBtn">Add to list</button>
        <button id="clearBtn" class="red-button">Clear</button>
    </div>

    <ul id="taskList"></ul>

    <script src="script.js"></script>
</body>
</html>
